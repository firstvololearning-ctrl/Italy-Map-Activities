<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Italy Map Activities</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="activity-layout">

    <aside class="control-panel">

      <header class="page-header">
        <img
          src="icons/logo.png"
          alt="First Volo Learning"
          class="logo"
        >

        <h1>Italy Map Activities</h1>

        <p class="subtitle">
          Discover the Regions of Italy
        </p>

        <div class="mode-buttons" aria-label="Choose an activity">
          <button
            class="mode-button active"
            data-mode="regions"
            type="button"
          >
            Regions
          </button>

          <button
            class="mode-button"
            data-mode="landmarks"
            type="button"
          >
            Landmarks
          </button>
        </div>
      </header>

      <section class="name-panel">
        <h2 id="panelHeading">Region Names</h2>

        <p id="instructions" class="instructions">
          Drag a name onto the correct colored region.
        </p>

        <div id="regionCards" class="region-cards"></div>

        <div class="button-row">
          <button id="shuffleButton" type="button">
            Shuffle
          </button>

          <button id="resetButton" type="button">
            Reset
          </button>
        </div>
      </section>

    </aside>

    <section class="map-panel">
      <div class="progress-row">
        <span id="progressText">0 of 20 correct</span>

        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="mapBoard" class="map-board">
        <img
          id="italyMap"
          src="assets/maps/italy.png"
          alt="Map of the regions of Italy"
        >

        <div id="dropZones" class="drop-zones"></div>
      </div>
    </section>

  </main>

  <div id="completionMessage" class="completion-message" hidden>
    <div class="completion-card">
      <div class="celebration">🎉</div>

      <h2>Fantastico!</h2>

      <p id="completionText">
        You matched all 20 Italian regions.
      </p>

      <button id="playAgainButton" type="button">
        Play Again
      </button>
    </div>
  </div>

  <script src="data/italy-data.js"></script>
  <script src="script.js"></script>

</body>
</html>
