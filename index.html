<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Match the Italian Regions</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="page-header">
    <h1>Match the Italian Regions</h1>
    <p>Drag each region name to its location on the map.</p>
  </header>

  <main class="activity-layout">

    <section class="map-panel">
      <div class="progress-row">
        <span id="progressText">0 of 20 correct</span>

        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="mapBoard" class="map-board">
        <img
          id="italyMap"
        src="assets/maps/italy.png"
          alt="Map of the regions of Italy"
        >

        <div id="dropZones" class="drop-zones"></div>
      </div>
    </section>

    <aside class="name-panel">
      <h2>Region Names</h2>

      <p class="instructions">
        Drag a name onto the correct colored region.
      </p>

      <div id="regionCards" class="region-cards"></div>

      <div class="button-row">
        <button id="shuffleButton" type="button">Shuffle</button>
        <button id="resetButton" type="button">Reset</button>
      </div>
    </aside>

  </main>

  <div id="completionMessage" class="completion-message" hidden>
    <div class="completion-card">
      <div class="celebration">🎉</div>
      <h2>Fantastico!</h2>
      <p>You matched all 20 Italian regions.</p>
      <button id="playAgainButton" type="button">Play Again</button>
    </div>
  </div>

<script src="data/italy-data.js"></script>
<script src="script.js"></script>
</body>
</html>
